syntax = "proto3";
package sentiric.audio_gen.v1;
option go_package = "github.com/sentiric/sentiric-contracts/gen/go/sentiric/audio_gen/v1;audiogenv1";

service AudioGatewayService {
  rpc SubmitAudioJob(SubmitAudioJobRequest) returns (SubmitAudioJobResponse);
}

message SubmitAudioJobRequest {
  string tenant_id = 1;
  string trace_id = 2;
  string prompt = 3;
  string audio_type = 4; // "music" (ACE-Step) veya "sfx" (AudioGen)
  int32 duration_seconds = 5;
}

message SubmitAudioJobResponse {
  bool accepted = 1;
  string job_id = 2;
}