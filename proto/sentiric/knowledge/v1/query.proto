// proto/sentiric/knowledge/v1/query.proto
syntax = "proto3";

package sentiric.knowledge.v1; // Paket adı korunur

option go_package = "github.com/sentiric/sentiric-contracts/gen/go/sentiric/knowledge/v1;knowledgev1";

// KnowledgeQueryService, kurumsal bilgi tabanını sorgulamak için metotlar sunar.
service KnowledgeQueryService {
  rpc Query(QueryRequest) returns (QueryResponse);
}

// Mesajların geri kalanı knowledge.proto'dan buraya taşınmıştır.
message QueryRequest {
  string tenant_id = 1;
  string query = 2;
  int32 top_k = 3;
}
message QueryResponse {
  repeated QueryResult results = 1;
}
message QueryResult {
  string content = 1;
  float score = 2;
  string source = 3;
  map<string, string> metadata = 4;
}

// --- [ARCH-COMPLIANCE: v4.0 Cognitive Memory Types] ---

message UserMemoryPayload {
  message BioAnchor {
    string bio_id = 1;
    float confidence = 2;
  }

  message Resonance {
    string mode = 1; // "deep_waters", "analytical", "executive", "vulnerable"
    float confidence = 2;
  }

  message Fact {
    string category = 1;
    int32 importance = 2; // 1 to 5
    string summary = 3;
    repeated string metadata = 4;
  }

  message Lifecycle {
    string trace_id = 1;
    string created_at = 2;
    string last_accessed = 3;
    float decay_score = 4;
    // [ARCH-COMPLIANCE: Subconscious Archiving]
    // Anılar tamamen silinmez, bilinçaltına (is_archived=true) itilir.
    bool is_archived = 5;
  }

  BioAnchor bio_anchor = 1;
  Resonance resonance = 2;
  Fact fact = 3;
  Lifecycle lifecycle = 4;
  string embedding_version = 5;
}

// Dialog-Service'in Crystalline/Knowledge üzerinden RAG çekerken kullanacağı istek
message QueryCognitiveMemoryRequest {
  string tenant_id = 1;
  string bio_id = 2;
  string query_text = 3;
  string current_resonance_mode = 4; // Hibrit skorlama için
  int32 top_k = 5;
}

message QueryCognitiveMemoryResponse {
  repeated UserMemoryPayload memories = 1;
}
